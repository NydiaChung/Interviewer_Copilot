<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Interview Copilot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      text-align: center;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #a0a0a0;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 13px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save {
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      color: #fff;
    }
    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
    }
    .btn-capture {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid #333;
    }
    .btn-capture:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .btn-capture.active {
      background: #ff4757;
      border-color: #ff4757;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }
    .status.success {
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
    }
    .status.error {
      background: rgba(255, 71, 87, 0.1);
      color: #ff4757;
    }
    .status.info {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎙️ Interview Copilot</h1>
  
  <div class="form-group">
    <label for="jd">岗位 JD</label>
    <textarea id="jd" placeholder="粘贴岗位描述..."></textarea>
  </div>
  
  <div class="form-group">
    <label for="resume">个人简历</label>
    <textarea id="resume" placeholder="粘贴个人简历..."></textarea>
  </div>
  
  <div class="btn-group">
    <button id="saveBtn" class="btn-save">💾 保存</button>
    <button id="captureBtn" class="btn-capture">🎤 开始捕获</button>
  </div>
  
  <div id="status" class="status hidden"></div>
  
  <script src="popup.js"></script>
</body>
</html>
